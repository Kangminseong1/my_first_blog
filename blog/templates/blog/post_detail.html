{% extends 'blog/base.html' %}

{% block content %}
    <div class="post">
        <div class="date">
            <p>published: {{ post.published_date }}</p>
        </div>
        <a class="btn btn-default" href="{% url 'post_edit' pk=post.pk %}">
            <span class="glyphicon glyphicon-pencil"></span>
        </a>
        <h1>{{ post.title }}</h1>
        <p>{{post.text|linebreaks}}</p>
    </div>
{% endblock %}
